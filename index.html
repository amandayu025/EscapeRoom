<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
    <title>Escape Room</title>
</head>
<body>
    <section id="all">
        <section>
            <div id="wall"></div>
        </section>
        <button id="b-left" onclick="change_wall_left()"></button>
        <button id="b-right" onclick="change_wall_right()"></button>
        <section id="inventory">
            <div id="i0" class="ibox"></div>
            <div id="i1" class="ibox"></div>
            <div id="i2" class="ibox"></div>
            <div id="i3" class="ibox"></div>
            <div id="i4" class="ibox"></div>
            <div id="i5" class="ibox"></div>
            <div id="i6" class="ibox"></div>
            <div id="i7" class="ibox"></div>
            <div id="i8" class="ibox"></div>
            <div id="i9" class="ibox"></div>
            <div id="i10" class="ibox"></div>
            <div id="i11" class="ibox"></div>
            <div id="i12" class="ibox"></div>
            <div id="i13" class="ibox"></div>
        </section>
    </section>
    <div id="notes">
        <h2>Notes:</h2>
        <textarea rows="27" cols="23" id="note-input" placeholder="Enter your note here..."></textarea>
    </div>
    <script src="script.js"></script>
</body>
</html>
